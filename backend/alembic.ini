# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, requires the python-dateutil library that can be
# installed via `pip install python-dateutil`
# default here is 'filename'
timezone = UTC

# max length of characters to apply to the
# "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment file as a standalone script,
# and to not touch the database at all.
# standalone_mode = false

# list of databases present in the environment
# databases =

# default database name
# database_name =

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for further
# detail and examples

# format using "black" - uses the black code formatter
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -l 79

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine
# "level = INFO" logs SQL queries.
# "level = DEBUG" logs SQL queries and results.
# "level = WARN" logs neither.  (Recommended for production)
# "level = ERROR" logs errors only.

[logger_alembic]
level = INFO
handlers =
qualname = alembic
# "level = INFO" logs basic migration operations.
# "level = DEBUG" logs migration operations and SQL.
# "level = WARN" logs warnings and errors only.
# "level = ERROR" logs errors only.
