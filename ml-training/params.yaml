# Hyperparameters for SatsVerdant Waste Classification
# Tracked by DVC for reproducibility

# Data preparation parameters
prepare:
  img_size: 224
  train_split: 0.80
  val_split: 0.10
  test_split: 0.10
  random_seed: 42

# Training parameters
train:
  base_model: EfficientNetB0
  batch_size: 32
  epochs_phase1: 10
  epochs_phase2: 20
  lr_phase1: 0.001
  lr_phase2: 0.00001
  dropout: 0.4
  fine_tune_layers: 30
  num_classes: 5
  confidence_threshold: 0.70

# Data augmentation parameters
augmentation:
  rotation_range: 40
  zoom_range: 0.3
  brightness_min: 0.7
  brightness_max: 1.3
  horizontal_flip: true
  vertical_flip: true
  shear_range: 0.2
  width_shift_range: 0.2
  height_shift_range: 0.2
  channel_shift_range: 30.0
  fill_mode: nearest

# Fraud detection parameters
fraud:
  hash_threshold: 10
  rate_limit_per_hour: 5
  min_confidence: 0.6
  max_fraud_score: 0.5

# Quality grading parameters
quality:
  grade_a:
    blur_min: 100
    brightness_min: 50
    brightness_max: 200
    contrast_min: 40
    reward_multiplier: 1.0
  grade_b:
    blur_min: 50
    brightness_min: 30
    brightness_max: 220
    contrast_min: 25
    reward_multiplier: 0.8
  grade_c:
    blur_min: 20
    brightness_min: 20
    brightness_max: 240
    contrast_min: 15
    reward_multiplier: 0.6
  grade_d:
    blur_min: 0
    brightness_min: 0
    brightness_max: 255
    contrast_min: 0
    reward_multiplier: 0.0

# Weight estimation parameters
weight:
  base_weights_kg:
    plastic: 0.5
    paper: 1.0
    metal: 0.8
    organic: 1.5
    glass: 0.7
  variance_factor: 0.15

# Model export parameters
export:
  h5_path: models/waste_classifier.h5
  tflite_path: models/waste_classifier.tflite
  optimize_for_mobile: true
  quantize: true
  target_spec:
    supported_types: [float16]
    optimizations: [DEFAULT]

# MLflow parameters
mlflow:
  experiment_name: waste-classifier-efficientnetb0
  tracking_uri: https://dagshub.com/satsverdant/satsverdant-ml.mlflow
  registry_name: satsverdant-waste-classifier
  auto_log: true

# DVC parameters
dvc:
  remote_name: origin
  remote_url: https://dagshub.com/satsverdant/satsverdant-ml.dvc
  cache_dir: .dvc/cache
