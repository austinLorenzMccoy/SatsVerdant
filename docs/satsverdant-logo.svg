<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e2d1c"/>
      <stop offset="100%" stop-color="#0d1a0c"/>
    </radialGradient>

    <!-- Gold shimmer gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7c06e"/>
      <stop offset="40%" stop-color="#f7931a"/>
      <stop offset="100%" stop-color="#d4611a"/>
    </linearGradient>

    <!-- Verdant green gradient -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7dbf6a"/>
      <stop offset="50%" stop-color="#4a8c3f"/>
      <stop offset="100%" stop-color="#2d5e28"/>
    </linearGradient>

    <!-- Leaf glow gradient -->
    <linearGradient id="leafGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#a8e063"/>
      <stop offset="50%" stop-color="#56ab2f"/>
      <stop offset="100%" stop-color="#2d7a1f"/>
    </linearGradient>

    <!-- Symbol gradient -->
    <linearGradient id="symbolGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff9ed"/>
      <stop offset="100%" stop-color="#f7c06e"/>
    </linearGradient>

    <!-- Ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7c06e" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#f7931a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4a8c3f" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Clip for circle -->
    <clipPath id="circleClip">
      <circle cx="200" cy="190" r="115"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>

  <!-- Subtle texture rings -->
  <circle cx="200" cy="190" r="155" fill="none" stroke="#3a5e36" stroke-width="0.5" opacity="0.4"/>
  <circle cx="200" cy="190" r="130" fill="none" stroke="#3a5e36" stroke-width="0.5" opacity="0.3"/>

  <!-- Outer decorative ring -->
  <circle cx="200" cy="190" r="148" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" opacity="0.7" stroke-dasharray="4 3"/>

  <!-- Main icon background disc -->
  <circle cx="200" cy="190" r="118" fill="#162314" filter="url(#shadow)"/>
  <circle cx="200" cy="190" r="116" fill="none" stroke="#4a8c3f" stroke-width="1" opacity="0.5"/>

  <!-- === LEAF SHAPE === -->
  <!-- Large elegant leaf pointing upward-right -->
  <path d="
    M 200 85
    C 240 90, 285 115, 295 160
    C 305 205, 280 248, 248 265
    C 220 280, 185 272, 168 255
    C 148 235, 142 205, 148 178
    C 155 148, 175 118, 200 85
    Z
  " fill="url(#leafGrad)" opacity="0.92" filter="url(#softGlow)"/>

  <!-- Leaf vein - main central -->
  <path d="M 200 95 Q 215 165, 225 255" fill="none" stroke="#c8f0a0" stroke-width="1.8" opacity="0.6" stroke-linecap="round"/>

  <!-- Leaf vein - left -->
  <path d="M 197 140 Q 178 158, 162 172" fill="none" stroke="#c8f0a0" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <path d="M 203 168 Q 182 183, 166 194" fill="none" stroke="#c8f0a0" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <path d="M 210 198 Q 190 210, 172 218" fill="none" stroke="#c8f0a0" stroke-width="1" opacity="0.35" stroke-linecap="round"/>

  <!-- Leaf vein - right -->
  <path d="M 207 145 Q 232 160, 250 170" fill="none" stroke="#c8f0a0" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <path d="M 214 175 Q 240 185, 258 192" fill="none" stroke="#c8f0a0" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <path d="M 218 205 Q 246 212, 262 215" fill="none" stroke="#c8f0a0" stroke-width="1" opacity="0.35" stroke-linecap="round"/>

  <!-- === BITCOIN / ₿ SYMBOL (elegant, overlaid center) === -->
  <g filter="url(#glow)">
    <!-- Vertical stem top -->
    <line x1="196" y1="138" x2="196" y2="250" stroke="url(#symbolGrad)" stroke-width="7" stroke-linecap="round" opacity="0.95"/>
    <!-- Vertical stem right-offset -->
    <line x1="208" y1="143" x2="208" y2="245" stroke="url(#symbolGrad)" stroke-width="7" stroke-linecap="round" opacity="0.95"/>

    <!-- Top bump of B -->
    <path d="M 196 148 Q 234 148, 234 168 Q 234 188, 196 188" fill="none" stroke="url(#symbolGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

    <!-- Bottom bump of B (slightly wider) -->
    <path d="M 196 188 Q 240 188, 240 210 Q 240 232, 196 232" fill="none" stroke="url(#symbolGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

    <!-- Top serif tick marks -->
    <line x1="190" y1="134" x2="215" y2="134" stroke="url(#symbolGrad)" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <!-- Bottom serif tick marks -->
    <line x1="190" y1="252" x2="215" y2="252" stroke="url(#symbolGrad)" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- Subtle leaf shimmer highlight -->
  <path d="
    M 202 92
    C 225 100, 262 125, 272 162
    C 278 188, 268 218, 252 238
  " fill="none" stroke="#ffffff" stroke-width="2" opacity="0.1" stroke-linecap="round"/>

  <!-- === TEXT === -->
  <!-- "SATS" -->
  <text
    x="200"
    y="316"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36"
    font-weight="700"
    letter-spacing="10"
    fill="url(#goldGrad)"
    text-anchor="middle"
    dominant-baseline="middle"
  >SATS</text>

  <!-- Thin divider line -->
  <line x1="130" y1="328" x2="270" y2="328" stroke="#4a8c3f" stroke-width="0.8" opacity="0.6"/>

  <!-- "VERDANT" -->
  <text
    x="200"
    y="346"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="14"
    font-weight="400"
    letter-spacing="7"
    fill="#8cbf7a"
    text-anchor="middle"
    dominant-baseline="middle"
  >VERDANT</text>

  <!-- Corner decorative dots -->
  <circle cx="122" cy="344" r="2" fill="#f7931a" opacity="0.5"/>
  <circle cx="278" cy="344" r="2" fill="#f7931a" opacity="0.5"/>
</svg>
